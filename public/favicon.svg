<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a14"/>

  <!-- Maserati trident -->
  <!-- Center prong -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#1e6fbf" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Center prong tip (arrow up) -->
  <polyline points="13,10 16,5 19,10" stroke="#1e6fbf" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Left prong -->
  <path d="M16 14 Q11 12 10 6" stroke="#1e6fbf" stroke-width="2" stroke-linecap="round" fill="none"/>
  <polyline points="8,9 10,6 13,8" stroke="#1e6fbf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right prong -->
  <path d="M16 14 Q21 12 22 6" stroke="#1e6fbf" stroke-width="2" stroke-linecap="round" fill="none"/>
  <polyline points="19,8 22,6 24,9" stroke="#1e6fbf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Base crossbar -->
  <line x1="10" y1="27" x2="22" y2="27" stroke="#1e6fbf" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="16" y2="27" stroke="#1e6fbf" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="10" y1="24" x2="10" y2="27" stroke="#1e6fbf" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="22" y1="24" x2="22" y2="27" stroke="#1e6fbf" stroke-width="2.2" stroke-linecap="round"/>
</svg>
